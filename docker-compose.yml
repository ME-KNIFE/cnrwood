name: cnrwood

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        PHP_VERSION: "8.3"
    image: cnrwood/app:latest
    container_name: cnrwood-app
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      # Override these via a .env file at the project root (Compose auto-loads it)
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY:-}
      APP_URL: ${APP_URL:-http://localhost}
      APP_LOCALE: ${APP_LOCALE:-tr}
      LOG_CHANNEL: ${LOG_CHANNEL:-stack}
      LOG_LEVEL: ${LOG_LEVEL:-info}

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: ${DB_DATABASE:-cnrwood}
      DB_USERNAME: ${DB_USERNAME:-cnrwood}
      DB_PASSWORD: ${DB_PASSWORD:-cnrwood_secret}

      CACHE_STORE: ${CACHE_STORE:-redis}
      SESSION_DRIVER: ${SESSION_DRIVER:-redis}
      QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_CLIENT: phpredis

      FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
    volumes:
      # Persist user-uploaded files and runtime storage across redeployments
      - app_storage:/var/www/html/storage
      - app_public_storage:/var/www/html/public/storage
    ports:
      - "${APP_HTTP_PORT:-8080}:80"
    networks:
      - cnrwood
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1/up || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s

  mysql:
    image: mysql:8.4
    container_name: cnrwood-mysql
    restart: unless-stopped
    command:
      # NOTE: --default-authentication-plugin was REMOVED in MySQL 8.4
      # (caching_sha2_password is the default). Do not re-add it.
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --mysql-native-password=ON
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-cnrwood}
      MYSQL_USER: ${DB_USERNAME:-cnrwood}
      MYSQL_PASSWORD: ${DB_PASSWORD:-cnrwood_secret}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_secret}
    volumes:
      # Named volume keeps data across container/image rebuilds
      - mysql_data:/var/lib/mysql
    ports:
      # Exposed only on the loopback interface by default
      - "${DB_FORWARD_PORT:-127.0.0.1:3306}:3306"
    networks:
      - cnrwood
    healthcheck:
      # `mysqladmin ping` returns success as soon as the server answers,
      # even with an "Access denied" reply — that's exactly what we want
      # while the data dir is still initializing on first boot.
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 90s

  redis:
    image: redis:7-alpine
    container_name: cnrwood-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - cnrwood
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

volumes:
  mysql_data:
    driver: local
  redis_data:
    driver: local
  app_storage:
    driver: local
  app_public_storage:
    driver: local

networks:
  cnrwood:
    driver: bridge
